name: Build and Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (defaults to manual-<sha7>)"
        required: false
        type: string
      push_latest:
        description: "Also publish :latest"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image variables
        id: vars
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"

          input_tag="${{ github.event.inputs.image_tag || '' }}"
          input_push_latest="${{ github.event.inputs.push_latest || 'false' }}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            image_tag="${GITHUB_REF_NAME}"
            push_latest="true"
          else
            image_tag="${input_tag}"
            if [[ -z "${image_tag}" ]]; then
              image_tag="manual-${GITHUB_SHA::7}"
            fi
            push_latest="${input_push_latest}"
          fi

          backend_tags="ghcr.io/${owner}/${repo}-backend:${image_tag}"
          frontend_tags="ghcr.io/${owner}/${repo}-frontend:${image_tag}"

          if [[ "${push_latest}" == "true" ]]; then
            backend_tags+=$'\n'"ghcr.io/${owner}/${repo}-backend:latest"
            frontend_tags+=$'\n'"ghcr.io/${owner}/${repo}-frontend:latest"
          fi

          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          {
            echo "backend_tags<<EOF"
            echo "${backend_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "frontend_tags<<EOF"
            echo "${frontend_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.vars.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            BACKEND_URL=http://backend:5000
          tags: ${{ steps.vars.outputs.frontend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Published tag: ${{ steps.vars.outputs.image_tag }}"
          echo "Backend image(s):"
          echo "${{ steps.vars.outputs.backend_tags }}"
          echo "Frontend image(s):"
          echo "${{ steps.vars.outputs.frontend_tags }}"
